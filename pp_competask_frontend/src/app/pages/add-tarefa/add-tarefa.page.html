<ion-content [fullscreen]="true" class="task-form-screen">
  <section class="task-form-shell">
    <header class="task-form-header">
      <button type="button" class="back-button" (click)="voltar()" aria-label="Voltar">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </button>
    </header>

    <form class="task-form" [formGroup]="form" (ngSubmit)="salvarTarefa()">
      <label class="field-label">Título</label>
      <label class="input-shell task-title" [class.input-shell--invalid]="form.controls['titulo'].touched && form.controls['titulo'].invalid">
        <input type="text" formControlName="titulo" placeholder="Nome da tarefa" />
      </label>

      <label class="field-label">Descrição</label>
      <label class="textarea-shell">
        <textarea formControlName="descricao" placeholder="Descreva a tarefa..."></textarea>
      </label>

      <label class="field-label">Prioridade</label>
      <label class="input-shell" [class.input-shell--invalid]="form.controls['prioridade'].touched && form.controls['prioridade'].invalid">
        <input type="number" formControlName="prioridade" placeholder="Ex: 1, 5, 10..." min="1" />
      </label>

      <label class="field-label">Data de Realização</label>
      <label class="input-shell" [class.input-shell--invalid]="form.controls['dataRealizacao'].touched && form.controls['dataRealizacao'].invalid">
        <input type="date" formControlName="dataRealizacao" aria-label="Selecionar data" />
      </label>

      <label class="field-label">Lembrete</label>
      <div class="reminder-grid">
        <label class="input-shell">
          <input type="date" formControlName="lembreteData" aria-label="Data do lembrete" />
        </label>

        <label class="input-shell">
          <input type="time" formControlName="lembreteHora" aria-label="Hora do lembrete" />
        </label>
      </div>
      <small class="field-help">Você será notificado nesse horário.</small>

      <label class="field-label">Tempo gasto</label>
      <label class="textarea-shell textarea-shell--timer">
        <textarea
          formControlName="tempoExecucao"
          placeholder="Os tempos do cronômetro/timer serão salvos aqui no formato [dd/mm/aaaa] hh:mm:ss"
        ></textarea>
      </label>

      <p class="mensagem" *ngIf="mensagemAcao">{{ mensagemAcao }}</p>

      <ion-button class="primary-button" type="submit" expand="block">
        {{ tarefaId ? 'SALVAR TAREFA' : 'CRIAR TAREFA' }}
      </ion-button>
      <ion-button *ngIf="tarefaId" class="danger-button" type="button" expand="block" fill="outline" (click)="excluirTarefa()">EXCLUIR TAREFA</ion-button>
    </form>
  </section>

  <nav class="bottom-nav" aria-label="Navegação inferior">
    <button
      *ngFor="let atalho of atalhosRodape"
      type="button"
      class="nav-item"
      [class.nav-item--active]="atalho.ativo"
      (click)="abrirAtalho(atalho)">
      <ion-icon [name]="atalho.icon"></ion-icon>
      <span>{{ atalho.label }}</span>
    </button>
  </nav>
</ion-content>
